<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你好，Cursor！</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 主题切换动画时长 + 颜色变量，方便统一管理 */
    :root {
      --theme-transition: 0.3s ease;
      --color-bg: #0A0B0F;
      --color-text: #f5f5f5;
      --color-nav-bg: #14151a;
      --color-nav-text: #f5f5f5;
      --color-nav-border: rgba(245, 245, 245, 0.12);
      --color-btn-bg: #f5f5f5;
      --color-btn-text: #0A0B0F;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --tag-bg: rgba(100, 180, 255, 0.15);
      --tag-text: rgba(100, 180, 255, 0.9);
      --tag-border: rgba(100, 180, 255, 0.25);
    }

    /* 浅色模式：页面、导航栏、按钮、卡片颜色对调 */
    body.light-mode {
      --color-bg: #f5f5f5;
      --color-text: #0A0B0F;
      --color-nav-bg: #ffffff;
      --color-nav-text: #0A0B0F;
      --color-nav-border: rgba(10, 11, 15, 0.1);
      --color-btn-bg: #0A0B0F;
      --color-btn-text: #f5f5f5;
      --card-bg: rgba(0, 0, 0, 0.05);
      --card-border: rgba(0, 0, 0, 0.08);
      --tag-bg: rgba(10, 11, 15, 0.08);
      --tag-text: #0A0B0F;
      --tag-border: rgba(10, 11, 15, 0.15);
    }

    /* 页面整体：纵向布局，深色背景 */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--color-bg);
      transition: background-color var(--theme-transition);
    }

    /* ========== 顶部导航栏 ========== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background-color: var(--color-nav-bg);
      color: var(--color-nav-text);
      border-bottom: 1px solid var(--color-nav-border);
      transition: background-color var(--theme-transition), color var(--theme-transition), border-color var(--theme-transition);
    }

    /* 左侧：Logo 与网站标题同一行、垂直居中 */
    .navbar-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: inherit;
    }

    .navbar-logo {
      width: 36px;
      height: 36px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
    }

    .navbar-title {
      font-size: 1.1rem;
      font-weight: 600;
      font-family: sans-serif;
    }

    /* 右侧：导航链接 + 主题切换按钮 */
    .navbar-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-link {
      font-size: 0.95rem;
      font-family: sans-serif;
      color: inherit;
      text-decoration: none;
      transition: opacity var(--theme-transition);
    }

    .nav-link:hover {
      opacity: 0.7;
    }

    /* ========== 主内容区 ========== */
    .page-main {
      flex: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* 顶部留出导航栏高度 + 间距，避免内容被遮挡 */
      padding: 96px 1.5rem 3rem;
      position: relative;
      z-index: 10;
      gap: 3rem;
    }

    /* 内容区：图片、标题纵向居中排列 */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .content img {
      width: 300px;
      display: block;
    }

    h1 {
      color: var(--color-text);
      font-size: 4rem;
      font-family: sans-serif;
      text-align: center;
      transition: color var(--theme-transition);
    }

    /* ========== 关于我毛玻璃卡片 ========== */
    .about-card {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 2.5rem;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      text-align: center;
      transition: background var(--theme-transition), border-color var(--theme-transition);
    }

    .about-card h2 {
      font-size: 1.5rem;
      font-family: sans-serif;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.75rem;
      transition: color var(--theme-transition);
    }

    .about-card .about-desc {
      font-size: 0.95rem;
      font-family: sans-serif;
      color: var(--color-text);
      opacity: 0.75;
      line-height: 1.6;
      margin-bottom: 1.25rem;
      transition: color var(--theme-transition);
    }

    .about-card .tag-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
    }

    .about-card .tag {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      font-family: sans-serif;
      background: var(--tag-bg);
      color: var(--tag-text);
      border: 1px solid var(--tag-border);
      border-radius: 20px;
      transition: background var(--theme-transition), color var(--theme-transition), border-color var(--theme-transition);
    }

    /* ========== 主题切换按钮（导航栏内） ========== */
    .toggle-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      min-width: 7.5rem;
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      font-family: sans-serif;
      background-color: var(--color-btn-bg);
      color: var(--color-btn-text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color var(--theme-transition), color var(--theme-transition);
    }

    /* 按钮内两种状态叠放，用透明度平滑切换 */
    .btn-state {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity var(--theme-transition);
    }

    .btn-state-dark {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    body.light-mode .btn-state-light {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    body.light-mode .btn-state-dark {
      position: static;
      opacity: 1;
      pointer-events: auto;
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
    }

    .btn-icon svg {
      width: 1.1em;
      height: 1.1em;
      fill: currentColor;
      transition: fill var(--theme-transition), stroke var(--theme-transition);
    }

    /* ========== 粒子背景 ========== */
    #particle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    canvas#particleCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- 粒子背景容器 -->
  <div id="particle-container">
    <canvas id="particleCanvas"></canvas>
  </div>

  <!-- 固定在顶部的导航栏 -->
  <nav class="navbar">
    <!-- 左侧：Logo + 网站标题 -->
    <a class="navbar-brand" href="#">
      <img class="navbar-logo" src="kylin头像 1 2.svg" alt="网站 Logo">
      <span class="navbar-title">Kylin</span>
    </a>

    <!-- 右侧：页面链接 + 深色/浅色切换 -->
    <div class="navbar-nav">
      <a class="nav-link" href="#">首页</a>
      <a class="nav-link" href="#">个人简历</a>
      <a class="nav-link" href="#">UI/UX作品</a>

      <button class="toggle-btn" id="toggleBtn">
        <span class="btn-state btn-state-light">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </span>
          浅色模式
        </span>
        <span class="btn-state btn-state-dark">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z"/>
            </svg>
          </span>
          深色模式
        </span>
      </button>
    </div>
  </nav>

  <!-- 主内容区：原有图片和文字保持不变 -->
  <main class="page-main">
    <div class="content">
      <!-- 居中显示的图片 -->
      <img src="image 22.png" alt="示例图片">

      <!-- “Cursor！代码的第一堂课”后面换行 -->
      <h1>你好，我是Kylin！学代码的第一步，<br>完成写一个简单网页</h1>
    </div>

    <!-- 关于我毛玻璃卡片 -->
    <div class="about-card">
      <h2>关于我</h2>
      <p class="about-desc">我是Kylin，一个正在学习AI编程和UI设计的新手，喜欢用代码把想法变成现实。</p>
      <div class="tag-list">
        <span class="tag">UI设计</span>
        <span class="tag">前端开发</span>
        <span class="tag">Figma</span>
        <span class="tag">VS Code</span>
      </div>
    </div>
  </main>

  <script>
    // ========== 粒子背景系统 ==========
    class ParticleSystem {
      constructor() {
        this.canvas = document.getElementById('particleCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.mouse = { x: 0, y: 0, active: false };
        this.connectionDistance = 150;
        this.particleCount = 50;
        this.time = 0;
        
        this.setup();
        this.initEventListeners();
        this.animate();
      }

      setup() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        this.createParticles();
      }

      createParticles() {
        this.particles = [];
        for (let i = 0; i < this.particleCount; i++) {
          this.particles.push({
            x: Math.random() * this.canvas.width,
            y: Math.random() * this.canvas.height,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            radius: Math.random() * 2 + 1,
            originalRadius: Math.random() * 2 + 1,
            phase: Math.random() * Math.PI * 2,
            pulseSpeed: 0.02 + Math.random() * 0.02
          });
        }
      }

      getParticleRadius() {
        return Math.random() * 2 + 1;
      }

      getParticleColor() {
        const isDarkMode = !document.body.classList.contains('light-mode');
        if (isDarkMode) {
          // 深色模式：白色 / 浅蓝混合
          const colors = ['rgba(255, 255, 255, 0.7)', 'rgba(100, 180, 255, 0.6)'];
          return colors[Math.floor(Math.random() * colors.length)];
        } else {
          // 浅色模式：深色
          return 'rgba(10, 11, 15, 0.5)';
        }
      }

      getLineColor() {
        const isDarkMode = !document.body.classList.contains('light-mode');
        if (isDarkMode) {
          return 'rgba(100, 180, 255, 0.2)';
        } else {
          return 'rgba(10, 11, 15, 0.1)';
        }
      }

      initEventListeners() {
        window.addEventListener('mousemove', (e) => {
          this.mouse.x = e.clientX;
          this.mouse.y = e.clientY;
          this.mouse.active = true;
        });

        window.addEventListener('mouseleave', () => {
          this.mouse.active = false;
        });

        window.addEventListener('resize', () => {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
        });
      }

      update() {
        this.time += 0.01;

        for (let particle of this.particles) {
          // 基础缓慢移动
          particle.x += particle.vx;
          particle.y += particle.vy;

          // 正弦波动画：添加平滑的脉动运动
          const waveX = Math.sin(this.time * 0.5 + particle.phase) * 0.5;
          const waveY = Math.cos(this.time * 0.5 + particle.phase + 1) * 0.5;
          particle.x += waveX;
          particle.y += waveY;

          // 边界反弹
          if (particle.x < 0 || particle.x > this.canvas.width) particle.vx *= -1;
          if (particle.y < 0 || particle.y > this.canvas.height) particle.vy *= -1;

          // 保持在视口内
          particle.x = Math.max(0, Math.min(this.canvas.width, particle.x));
          particle.y = Math.max(0, Math.min(this.canvas.height, particle.y));

          // 动态脉冲效果
          const pulse = Math.sin(this.time * particle.pulseSpeed + particle.phase) * 0.5 + 1;
          
          // 鼠标互动
          if (this.mouse.active) {
            const dx = this.mouse.x - particle.x;
            const dy = this.mouse.y - particle.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = 100;

            if (dist < minDist) {
              const repel = 1.5;
              const angle = Math.atan2(dy, dx);
              particle.vx -= Math.cos(angle) * repel;
              particle.vy -= Math.sin(angle) * repel;
              
              // 粒子靠近鼠标时放大
              particle.radius = particle.originalRadius * 1.8 * pulse;
            } else {
              particle.radius = particle.originalRadius * pulse;
            }
          } else {
            particle.radius = particle.originalRadius * pulse;
          }

          // 速度阻尼（更强的阻尼使运动更缓慢）
          particle.vx *= 0.985;
          particle.vy *= 0.985;
        }
      }

      draw() {
        // 清除画布
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        // 绘制连线
        this.drawConnections();

        // 绘制粒子
        for (let particle of this.particles) {
          this.ctx.fillStyle = this.getParticleColor();
          this.ctx.beginPath();
          this.ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          this.ctx.fill();
        }
      }

      drawConnections() {
        this.ctx.strokeStyle = this.getLineColor();
        this.ctx.lineWidth = 1;

        for (let i = 0; i < this.particles.length; i++) {
          for (let j = i + 1; j < this.particles.length; j++) {
            const dx = this.particles[i].x - this.particles[j].x;
            const dy = this.particles[i].y - this.particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < this.connectionDistance) {
              this.ctx.beginPath();
              this.ctx.moveTo(this.particles[i].x, this.particles[i].y);
              this.ctx.lineTo(this.particles[j].x, this.particles[j].y);
              this.ctx.stroke();
            }
          }
        }
      }

      animate() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.animate());
      }
    }

    // 初始化粒子系统
    const particleSystem = new ParticleSystem();

    // 主题切换时刷新粒子颜色
    const toggleBtn = document.getElementById('toggleBtn');
    const body = document.body;

    toggleBtn.addEventListener('click', function () {
      body.classList.toggle('light-mode');
    });
  </script>
</body>
</html>
