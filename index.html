<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你好，Cursor！</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 主题切换动画时长 + 颜色变量，方便统一管理 */
    :root {
      --theme-transition: 0.3s ease;
      --color-bg: #0A0B0F;
      --color-text: #f5f5f5;
      --color-nav-bg: #14151a;
      --color-nav-text: #f5f5f5;
      --color-nav-border: rgba(245, 245, 245, 0.12);
      --color-btn-bg: #f5f5f5;
      --color-btn-text: #0A0B0F;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --tag-bg: rgba(100, 180, 255, 0.15);
      --tag-text: rgba(100, 180, 255, 0.9);
      --tag-border: rgba(100, 180, 255, 0.25);
    }

    /* 浅色模式：页面、导航栏、按钮、卡片颜色对调 */
    body.light-mode {
      --color-bg: #f5f5f5;
      --color-text: #0A0B0F;
      --color-nav-bg: #ffffff;
      --color-nav-text: #0A0B0F;
      --color-nav-border: rgba(10, 11, 15, 0.1);
      --color-btn-bg: #0A0B0F;
      --color-btn-text: #f5f5f5;
      --card-bg: rgba(0, 0, 0, 0.05);
      --card-border: rgba(0, 0, 0, 0.08);
      --tag-bg: rgba(10, 11, 15, 0.08);
      --tag-text: #0A0B0F;
      --tag-border: rgba(10, 11, 15, 0.15);
    }

    /* 页面整体：纵向布局，深色背景 */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--color-bg);
      transition: background-color var(--theme-transition);
    }

    /* ========== 顶部导航栏 ========== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background-color: var(--color-nav-bg);
      color: var(--color-nav-text);
      border-bottom: 1px solid var(--color-nav-border);
      transition: background-color var(--theme-transition), color var(--theme-transition), border-color var(--theme-transition);
    }

    /* 左侧：Logo 与网站标题同一行、垂直居中 */
    .navbar-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: inherit;
    }

    .navbar-logo {
      width: 36px;
      height: 36px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
    }

    .navbar-title {
      font-size: 1.1rem;
      font-weight: 600;
      font-family: sans-serif;
    }

    /* 右侧：导航链接 + 主题切换按钮 */
    .navbar-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-link {
      font-size: 0.95rem;
      font-family: sans-serif;
      color: inherit;
      text-decoration: none;
      transition: opacity var(--theme-transition);
    }

    .nav-link:hover {
      opacity: 0.7;
    }

    /* ========== 主内容区 ========== */
    .page-main {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 64px;
      padding-bottom: 3rem;
      position: relative;
      z-index: 10;
    }

    /* 内容区：图片、标题纵向居中排列 */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .content img {
      width: 300px;
      display: block;
    }

    h1 {
      color: var(--color-text);
      font-size: 4rem;
      font-family: sans-serif;
      text-align: center;
      transition: color var(--theme-transition);
    }

    /* ========== Banner 轮播图 ========== */
    .banner-section {
      width: 100%;
      position: relative;
      z-index: 10;
    }

    .banner-carousel {
      width: 100%;
      height: 680px;
      position: relative;
      overflow: hidden;
    }

    .banner-track {
      display: flex;
      height: 100%;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .banner-slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      transition: background var(--theme-transition), border-color var(--theme-transition);
    }

    /* 左侧文案区 */
    .banner-left {
      flex: 0 0 45%;
      padding: 3rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .banner-left h2 {
      font-size: 2.2rem;
      font-family: sans-serif;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 1rem;
      transition: color var(--theme-transition);
      text-align: left;
    }

    .banner-left .banner-desc {
      font-size: 1.05rem;
      font-family: sans-serif;
      color: var(--color-text);
      opacity: 0.75;
      line-height: 1.7;
      margin-bottom: 1.5rem;
      transition: color var(--theme-transition);
      text-align: left;
    }

    .banner-left .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .banner-left .tag {
      display: inline-block;
      padding: 0.35rem 0.9rem;
      font-size: 0.85rem;
      font-family: sans-serif;
      background: var(--tag-bg);
      color: var(--tag-text);
      border: 1px solid var(--tag-border);
      border-radius: 20px;
      transition: background var(--theme-transition), color var(--theme-transition), border-color var(--theme-transition);
    }

    /* 右侧图片区 */
    .banner-right {
      flex: 0 0 50%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .banner-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .banner-right .banner-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8rem;
      background: linear-gradient(135deg, rgba(100, 180, 255, 0.1), rgba(160, 120, 255, 0.1));
      transition: background var(--theme-transition);
    }

    /* 轮播指示器 */
    .banner-indicators {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 1.2rem;
    }

    .banner-indicators .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--color-text);
      opacity: 0.3;
      cursor: pointer;
      border: none;
      transition: opacity var(--theme-transition), transform var(--theme-transition);
    }

    .banner-indicators .dot.active {
      opacity: 0.9;
      transform: scale(1.3);
    }

    /* 轮播箭头 */
    .banner-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: var(--color-text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0.6;
      transition: opacity var(--theme-transition), background var(--theme-transition), border-color var(--theme-transition);
    }

    .banner-arrow:hover {
      opacity: 1;
    }

    .banner-arrow.prev {
      left: 1rem;
    }

    .banner-arrow.next {
      right: 1rem;
    }

    /* 响应式：小屏切换为上下布局 */
    @media (max-width: 768px) {
      .banner-slide {
        flex-direction: column;
      }
      .banner-left {
        flex: 0 0 auto;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      .banner-left h2,
      .banner-left .banner-desc {
        text-align: center;
      }
      .banner-left .tag-list {
        justify-content: center;
      }
      .banner-right {
        flex: 0 0 auto;
        width: 100%;
        height: 40%;
      }
    }

    /* ========== 主题切换按钮（导航栏内） ========== */
    .toggle-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      min-width: 7.5rem;
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      font-family: sans-serif;
      background-color: var(--color-btn-bg);
      color: var(--color-btn-text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color var(--theme-transition), color var(--theme-transition);
    }

    /* 按钮内两种状态叠放，用透明度平滑切换 */
    .btn-state {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity var(--theme-transition);
    }

    .btn-state-dark {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    body.light-mode .btn-state-light {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    body.light-mode .btn-state-dark {
      position: static;
      opacity: 1;
      pointer-events: auto;
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
    }

    .btn-icon svg {
      width: 1.1em;
      height: 1.1em;
      fill: currentColor;
      transition: fill var(--theme-transition), stroke var(--theme-transition);
    }

    /* ========== 粒子背景 ========== */
    #particle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    canvas#particleCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <script>
    // ========== 粒子背景系统 ==========
    class ParticleSystem {
      constructor() {
        this.canvas = document.getElementById('particleCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.mouse = { x: 0, y: 0, active: false };
        this.connectionDistance = 150;
        this.particleCount = 50;
        this.time = 0;
        
        this.setup();
        this.initEventListeners();
        this.animate();
      }

      setup() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        this.createParticles();
      }

      createParticles() {
        this.particles = [];
        for (let i = 0; i < this.particleCount; i++) {
          this.particles.push({
            x: Math.random() * this.canvas.width,
            y: Math.random() * this.canvas.height,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            radius: Math.random() * 2 + 1,
            originalRadius: Math.random() * 2 + 1,
            phase: Math.random() * Math.PI * 2,
            pulseSpeed: 0.02 + Math.random() * 0.02
          });
        }
      }

      getParticleRadius() {
        return Math.random() * 2 + 1;
      }

      getParticleColor() {
        const isDarkMode = !document.body.classList.contains('light-mode');
        if (isDarkMode) {
          // 深色模式：白色 / 浅蓝混合
          const colors = ['rgba(255, 255, 255, 0.7)', 'rgba(100, 180, 255, 0.6)'];
          return colors[Math.floor(Math.random() * colors.length)];
        } else {
          // 浅色模式：深色
          return 'rgba(10, 11, 15, 0.5)';
        }
      }

      getLineColor() {
        const isDarkMode = !document.body.classList.contains('light-mode');
        if (isDarkMode) {
          return 'rgba(100, 180, 255, 0.2)';
        } else {
          return 'rgba(10, 11, 15, 0.1)';
        }
      }

      initEventListeners() {
        window.addEventListener('mousemove', (e) => {
          this.mouse.x = e.clientX;
          this.mouse.y = e.clientY;
          this.mouse.active = true;
        });

        window.addEventListener('mouseleave', () => {
          this.mouse.active = false;
        });

        window.addEventListener('resize', () => {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
        });
      }

      update() {
        this.time += 0.01;

        for (let particle of this.particles) {
          // 基础缓慢移动
          particle.x += particle.vx;
          particle.y += particle.vy;

          // 正弦波动画：添加平滑的脉动运动
          const waveX = Math.sin(this.time * 0.5 + particle.phase) * 0.5;
          const waveY = Math.cos(this.time * 0.5 + particle.phase + 1) * 0.5;
          particle.x += waveX;
          particle.y += waveY;

          // 边界反弹
          if (particle.x < 0 || particle.x > this.canvas.width) particle.vx *= -1;
          if (particle.y < 0 || particle.y > this.canvas.height) particle.vy *= -1;

          // 保持在视口内
          particle.x = Math.max(0, Math.min(this.canvas.width, particle.x));
          particle.y = Math.max(0, Math.min(this.canvas.height, particle.y));

          // 动态脉冲效果
          const pulse = Math.sin(this.time * particle.pulseSpeed + particle.phase) * 0.5 + 1;
          
          // 鼠标互动
          if (this.mouse.active) {
            const dx = this.mouse.x - particle.x;
            const dy = this.mouse.y - particle.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = 100;

            if (dist < minDist) {
              const repel = 1.5;
              const angle = Math.atan2(dy, dx);
              particle.vx -= Math.cos(angle) * repel;
              particle.vy -= Math.sin(angle) * repel;
              
              // 粒子靠近鼠标时放大
              particle.radius = particle.originalRadius * 1.8 * pulse;
            } else {
              particle.radius = particle.originalRadius * pulse;
            }
          } else {
            particle.radius = particle.originalRadius * pulse;
          }

          // 速度阻尼（更强的阻尼使运动更缓慢）
          particle.vx *= 0.985;
          particle.vy *= 0.985;
        }
      }

      draw() {
        // 清除画布
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        // 绘制连线
        this.drawConnections();

        // 绘制粒子
        for (let particle of this.particles) {
          this.ctx.fillStyle = this.getParticleColor();
          this.ctx.beginPath();
          this.ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          this.ctx.fill();
        }
      }

      drawConnections() {
        this.ctx.strokeStyle = this.getLineColor();
        this.ctx.lineWidth = 1;

        for (let i = 0; i < this.particles.length; i++) {
          for (let j = i + 1; j < this.particles.length; j++) {
            const dx = this.particles[i].x - this.particles[j].x;
            const dy = this.particles[i].y - this.particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < this.connectionDistance) {
              this.ctx.beginPath();
              this.ctx.moveTo(this.particles[i].x, this.particles[i].y);
              this.ctx.lineTo(this.particles[j].x, this.particles[j].y);
              this.ctx.stroke();
            }
          }
        }
      }

      animate() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.animate());
      }
    }

    // 初始化粒子系统
    const particleSystem = new ParticleSystem();

    // 主题切换时刷新粒子颜色
    const toggleBtn = document.getElementById('toggleBtn');
    const body = document.body;

    toggleBtn.addEventListener('click', function () {
      body.classList.toggle('light-mode');
    });

    // ========== Banner 轮播系统 ==========
    (function () {
      const track = document.getElementById('bannerTrack');
      const slides = document.querySelectorAll('.banner-slide');
      const dots = document.querySelectorAll('#bannerIndicators .dot');
      const prevBtn = document.getElementById('bannerPrev');
      const nextBtn = document.getElementById('bannerNext');
      const total = slides.length;
      let current = 0;
      let autoTimer;

      function goTo(index) {
        if (index < 0) index = total - 1;
        if (index >= total) index = 0;
        current = index;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        dots.forEach(function (d, i) {
          d.classList.toggle('active', i === current);
        });
      }

      function next() { goTo(current + 1); }
      function prev() { goTo(current - 1); }

      function startAuto() {
        stopAuto();
        autoTimer = setInterval(next, 4000);
      }

      function stopAuto() {
        if (autoTimer) clearInterval(autoTimer);
      }

      prevBtn.addEventListener('click', function () { prev(); startAuto(); });
      nextBtn.addEventListener('click', function () { next(); startAuto(); });

      dots.forEach(function (dot) {
        dot.addEventListener('click', function () {
          goTo(parseInt(this.getAttribute('data-index')));
          startAuto();
        });
      });

      // 触摸滑动支持
      let touchStartX = 0;
      let touchEndX = 0;
      const carousel = document.getElementById('bannerCarousel');
      carousel.addEventListener('touchstart', function (e) {
        touchStartX = e.changedTouches[0].screenX;
        stopAuto();
      });
      carousel.addEventListener('touchend', function (e) {
        touchEndX = e.changedTouches[0].screenX;
        if (touchStartX - touchEndX > 50) next();
        if (touchEndX - touchStartX > 50) prev();
        startAuto();
      });

      startAuto();
    })();

    // ========== 加载 Banner 图片 ==========
    // 自动加载有 data-src 的图片，隐藏占位符
    document.querySelectorAll('.banner-slide').forEach(function (slide) {
      var img = slide.querySelector('.banner-right img');
      var placeholder = slide.querySelector('.banner-placeholder');
      var src = img.getAttribute('data-src');
      if (src) {
        img.onload = function () {
          img.style.display = 'block';
          if (placeholder) placeholder.style.display = 'none';
        };
        img.onerror = function () {
          // 图片加载失败，保持占位符显示
        };
        img.src = src;
      }
    });
  </script>
</body>
</html>
